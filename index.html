<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>captcha</title>

    <!-- hair -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&amp;display=swap"
    />
    <link

    <link rel="stylesheet" href="css/style.css" />

  </head>

  <body>
    <div class="all">
      <ul class="intro_text">
        <li>WOMAN</li>
        <li>IN</li>
        <li>REFRIGERATOR</li>
      </ul>

      <!-- hair intro -->
      <div id="intro">
        <img src="image/bg.png" class="bg1" alt="bg" />
        <!-- <video class="bg-video" autoplay muted loop playsinline>
          <source src="image/bg.mp4" type="video/mp4" />
        </video> -->
        <canvas id="canvas"></canvas>
      </div>

      <div id="captcha" class="wrap">
        <!-- <div class="button-wrap">
        <button data-style="0">STYLE 01</button>
        <button data-style="1">STYLE 02</button>
        <button data-style="2">STYLE 03</button>
        <button data-style="3">STYLE 04</button>
        <button data-style="4">STYLE 05</button>
        <button data-style="5">STYLE 06</button>
        <button data-style="6">STYLE 07</button>
        <button data-style="7">STYLE 08</button>
        <button data-style="8">STYLE 09</button>
        <button data-style="9">STYLE 10</button>
      </div> -->

        <div class="bg">
          <div class="bg-images">
            <img src="image/bg2.png" class="plate-bg bg2 active" alt="bg" />
            <img src="image/bg3.png" class="plate-bg bg3" alt="bg" />
            <img src="image/bg4.png" class="plate-bg bg4" alt="bg" />
          </div>

          <div class="table">
            <ul class="tableware">
              <li class="fork"><img src="image/fork.png" alt="fork" /></li>
              <li class="knife"><img src="image/knife.png" alt="knife" /></li>
            </ul>
          </div>

          <div class="captcha-container">
            <div class="captcha-mask">
              <canvas id="captchaCanvas" width="1200" height="500"></canvas>
            </div>
          </div>

          <div class="ui">
            <!-- 실제 입력 -->
            <input
              type="text"
              id="textInput"
              autocomplete="off"
              maxlength="15"
            />

            <!-- 곡선 텍스트 -->
            <svg id="curveInput" viewBox="0 0 1000 1000">
              <!-- 아래쪽 반원 -->
              <path
                id="bottomCurve"
                d="
              M200,50
              A2800,2800 0 1,0 800,50
            "
                stroke="red"
                stroke-width="0"
                fill="none"
              />

              <text class="curve-text">
                <textPath
                  id="curveTextPath"
                  href="#bottomCurve"
                  startOffset="50%"
                  text-anchor="middle"
                ></textPath>
              </text>
            </svg>

            <button id="refreshStyle"></button>
            <button id="refreshText"></button>
          </div>
        </div>

        <!-- <div class="ui">
        <input
          type="text"
          id="textInput"
          placeholder="TEXT INPUT"
          value="CAPTCHA"
        />

        <button id="refreshStyle">STYLE</button>
        <button id="refreshText">RESET</button> -->
        <!-- </div> -->
      </div>
    </div>

    <!-- hair -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/110/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.0.3/chroma.min.js"></script>
    <script src="https://klevron.github.io/codepen/lib/verlet-1.0.0.min.js"></script>
    <script src="js/hair.js"></script>
    <script>
      const intro = document.getElementById("intro");
      const captcha = document.getElementById("captcha");

      intro.addEventListener("click", () => {
        intro.style.display = "none";
        captcha.classList.remove("hidden");
      });
    </script>

    <!-- captcha -->
    <script src="js/styles/style01.js"></script>
    <script src="js/styles/style02.js"></script>
    <script src="js/styles/style03.js"></script>
    <script src="js/styles/style04.js"></script>
    <script src="js/styles/style05.js"></script>
    <script src="js/styles/style06.js"></script>
    <script src="js/styles/style07.js"></script>
    <script src="js/styles/style08.js"></script>

    <script src="js/styles/style09.js"></script>
    <script src="js/styles/style10.js"></script>

    <script src="js/main.js"></script>

    <script>
      const ui = document.querySelector(".ui");

      const bg2 = document.querySelector(".bg2");
      const bg3 = document.querySelector(".bg3");
      const bg4 = document.querySelector(".bg4");

      function activateBG(target) {
        [bg2, bg3, bg4].forEach((bg) => {
          bg.classList.remove("active");
        });

        target.classList.add("active");
      }

      function hideUI() {
        ui.style.opacity = "0";
        ui.style.pointerEvents = "none";
      }

      function showUI() {
        ui.style.opacity = "1";
        ui.style.pointerEvents = "auto";
      }

      document.querySelector(".fork").addEventListener("mouseenter", () => {
        activateBG(bg3);
        hideUI();
      });

      document.querySelector(".fork").addEventListener("mouseleave", () => {
        activateBG(bg2);
        showUI();
      });

      document.querySelector(".knife").addEventListener("mouseenter", () => {
        activateBG(bg4);
        hideUI();
      });

      document.querySelector(".knife").addEventListener("mouseleave", () => {
        activateBG(bg2);
        showUI();
      });
    </script>
  </body>
</html>
